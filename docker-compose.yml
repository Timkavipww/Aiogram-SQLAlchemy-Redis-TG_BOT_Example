services:
  postgres:
    image: postgis/postgis
    container_name: postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - my-network

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: mybot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - my-network

  redis:
    container_name: redis
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - my-network

networks:
  my-network:


volumes:
  postgres_data:
  redis-data:
